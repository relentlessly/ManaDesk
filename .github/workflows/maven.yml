# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
   inputs:
        version:
          type: string
          description: version number to release
  #push:
  #  branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Set Release Date and Time
      run: |
        echo "RELEASE_DATE=$(date +%Y%m%d)" >> "$GITHUB_ENV"
        echo "RELEASE_TIME=$(date +%H%M)" >> "$GITHUB_ENV"
    - name: Build with Via Script
      run: ./build.sh -r -v ${{ github.event.inputs.version }}
    - name: Create Branch with build results
      run: |
          git config --global user.name 'github-automation'
          git config --global user.email 'github-automation@users.noreply.github.com'
          git checkout -b feature/v${{ github.event.inputs.version }}
          git commit -am "Release ${{ github.event.inputs.version }}"
          git push --set-upstream origin feature/v${{ github.event.inputs.version }}
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}
    - name: Create Release with build files
      run: |
        echo "pwd"
        echo "ls -al"
        echo "ls -al ./com.reflexit.magiccards.product/target/products/"
        gh release create v${{ github.event.inputs.version }} --generate-notes --latest ./com.reflexit.magiccards.product/target/products/manadesk-${{ github.event.inputs.version }}.${{env.RELEASE_DATE}}${{env.RELEASE_TIME}}-linux.gtk.x86_64.tar.gz ./com.reflexit.magiccards.product/target/products/manadesk-${{ github.event.inputs.version }}.${{env.RELEASE_DATE}}${{env.RELEASE_TIME}}-macosx.cocoa.x86_64.tar.gz ./com.reflexit.magiccards.product/target/products/manadesk-${{ github.event.inputs.version }}.${{env.RELEASE_DATE}}${{env.RELEASE_TIME}}-macosx.cocoa.x86_64.tar.gz com.reflexit.magiccards.product/target/products/manadesk-${{ github.event.inputs.version }}.yearmonthdayhourminute-win32.win32.x86_64.zip
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create pull request for ManaDesk self update
      run: gh pr create -B main -H feature/v${{ github.event.inputs.version }} --title 'Merge feature/v${{ github.event.inputs.version }} into main for release ${{ github.event.inputs.version }}' --body 'Created by Github action'
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
